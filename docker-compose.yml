services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: applocation-base
    container_name: applocation_app
    restart: unless-stopped
    volumes:
      - ./:/var/www
      # Les dossiers générés dans le container ne doivent pas être écrasés
      - /var/www/vendor
      - /var/www/node_modules
      - build-assets:/var/www/public/build
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-applocation}
      - DB_USERNAME=${DB_USERNAME:-applocation}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - BROADCAST_DRIVER=reverb
    depends_on:
      - db
      - redis
    networks:
      - app-network

  web:
    image: nginx:alpine
    container_name: applocation_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - build-assets:/var/www/public/build
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: applocation_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-applocation}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-applocation}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: applocation_redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - app-network

  queue:
    image: applocation-base
    container_name: applocation_queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./:/var/www
      - /var/www/vendor
    depends_on:
      - app
      - redis
    networks:
      - app-network

  reverb:
    image: applocation-base
    container_name: applocation_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host="0.0.0.0" --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./:/var/www
      - /var/www/vendor
    depends_on:
      - app
      - redis
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
  build-assets:
